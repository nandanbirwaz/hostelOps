services:
  mongodb:
    image: mongo:8.0.19-noble
    container_name: hostelops-mongodb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - hostelops-network

  backend:
    image: ${DOCKERHUB_USERNAME}/hostelops-backend:latest
    container_name: hostelops-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hostelops-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/hostelops-frontend:latest
    container_name: hostelops-frontend
    environment:
      # Relative API URL now handled heavily by nginx routing /api to backend
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hostelops-network

  nginx:
    image: nginx:alpine
    container_name: hostelops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - hostelops-network

volumes:
  mongodb_data:

networks:
  hostelops-network:
    driver: bridge
