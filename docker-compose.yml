version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hostelops-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - hostelops-network

  backend:
    build: ./backend
    container_name: hostelops-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/hostelops
      - JWT_SECRET=super_secret_jwt_key_here
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - hostelops-network

  frontend:
    build: ./frontend
    container_name: hostelops-frontend
    environment:
      # Relative API URL now handled heavily by nginx routing /api to backend
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hostelops-network

  nginx:
    image: nginx:alpine
    container_name: hostelops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - hostelops-network

volumes:
  mongodb_data:

networks:
  hostelops-network:
    driver: bridge
