name: CI/CD - PR validation & Main deploy

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  # ----------------------------------------
  # PRs: build (multi-stage), cache, scan, NO push, NO deploy
  # ----------------------------------------
  build-scan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push, cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          pull: true
          tags: hostelops-pr-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image (no push, cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          pull: true
          tags: hostelops-pr-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan backend (PR)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: hostelops-pr-backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Trivy scan frontend (PR)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: hostelops-pr-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # ----------------------------------------
  # main/master: build, scan, push SHA+latest
  # ----------------------------------------
  build-scan-push-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1) Build images locally (no push), using cache
      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          pull: true
          tags: hostelops-main-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          pull: true
          tags: hostelops-main-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # 2) Scan local images with Trivy; fail here if critical vulns
      - name: Trivy scan backend (main)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: hostelops-main-backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Trivy scan frontend (main)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: hostelops-main-frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # 3) Only if scans passed, log in & push SHA + latest tags
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push images (backend & frontend)
        run: |
          set -e
          # Backend
          docker tag hostelops-main-backend:${GITHUB_SHA} ${DOCKERHUB_USERNAME}/hostelops-backend:${GITHUB_SHA}
          docker tag hostelops-main-backend:${GITHUB_SHA} ${DOCKERHUB_USERNAME}/hostelops-backend:latest
          docker push ${DOCKERHUB_USERNAME}/hostelops-backend:${GITHUB_SHA}
          docker push ${DOCKERHUB_USERNAME}/hostelops-backend:latest
          # Frontend
          docker tag hostelops-main-frontend:${GITHUB_SHA} ${DOCKERHUB_USERNAME}/hostelops-frontend:${GITHUB_SHA}
          docker tag hostelops-main-frontend:${GITHUB_SHA} ${DOCKERHUB_USERNAME}/hostelops-frontend:latest
          docker push ${DOCKERHUB_USERNAME}/hostelops-frontend:${GITHUB_SHA}
          docker push ${DOCKERHUB_USERNAME}/hostelops-frontend:latest
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

  # ----------------------------------------
  #Deploy only on main/master push
  #----------------------------------------
  deploy-vm:
    needs: build-scan-push-main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM (pull, prune old images, safe restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            export DOCKERHUB_USERNAME='${{ vars.DOCKERHUB_USERNAME }}'
            cd ${{ vars.VM_APP_PATH }}
            git pull origin main || git pull origin master
            docker compose -f docker-compose.hub.yml pull
            # Remote prune: clean up dangling / old images (safe-ish)
            docker image prune -af --filter "until=24h" || true
            # Safe restart of stack
            docker compose -f docker-compose.hub.yml up -d
            